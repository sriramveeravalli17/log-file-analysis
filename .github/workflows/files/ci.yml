name: Log Analyzer CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Run Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests with pytest
        run: |
          pytest test_analyzer.py -v --tb=short

      - name: Run analyzer on sample log (smoke test)
        run: |
          python analyzer.py sample_auth.log --threshold 5 --output report.json
          cat report.json

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: analysis-report-py${{ matrix.python-version }}
          path: report.json
